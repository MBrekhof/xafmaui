<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- XAF logo inspired: hexagonal X shape -->
  <g transform="translate(256, 160)">
    <!-- Outer hexagon outline -->
    <polygon points="0,-80 69.3,-40 69.3,40 0,80 -69.3,40 -69.3,-40"
             fill="none" stroke="#FFFFFF" stroke-width="6"/>
    <!-- X inside hexagon -->
    <line x1="-35" y1="-35" x2="35" y2="35" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <line x1="35" y1="-35" x2="-35" y2="35" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <!-- Small dots at X endpoints (MAUI-inspired) -->
    <circle cx="-35" cy="-35" r="6" fill="#FFFFFF"/>
    <circle cx="35" cy="-35" r="6" fill="#FFFFFF"/>
    <circle cx="-35" cy="35" r="6" fill="#FFFFFF"/>
    <circle cx="35" cy="35" r="6" fill="#FFFFFF"/>
  </g>
  <!-- "Project Admin" text -->
  <text x="256" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="36" font-weight="bold" fill="#FFFFFF" letter-spacing="4">
    PROJECT ADMIN
  </text>
  <!-- Subtle tagline -->
  <text x="256" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="16" fill="#FFFFFF" opacity="0.7" letter-spacing="6">
    XAF + MAUI
  </text>
</svg>
